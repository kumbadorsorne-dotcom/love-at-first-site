<style>
  :root {
    /* Burgundy · White · Black */
    --paper: #FFFFFF;
    --paper-2: #F5F5F5;
    --paper-3: #EBEBEB;
    --ink: #0A0A0A;
    --ink-2: #333333;
    --ink-3: #888888;
    --rust: #6B1520;
    --rust-ink: #6B1520;
    --cream: #FFFFFF;
    --line: #0A0A0A0A;
    --line-strong: #0A0A0A1A;
    --heart: #6B1520;
  }
  [data-theme="dark"] {
    --paper: #0A0A0A;
    --paper-2: #1A1A1A;
    --paper-3: #2A2A2A;
    --ink: #FFFFFF;
    --ink-2: #CCCCCC;
    --ink-3: #888888;
    --rust: #A83040;
    --rust-ink: #E8A0A8;
    --cream: #111111;
    --line: #FFFFFF18;
    --line-strong: #FFFFFF30;
    --heart: #A83068;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: 'Lato', system-ui, sans-serif; }
  body { min-height: 100vh; overflow-x: hidden; }
  #root { min-height: 100vh; }
  .serif { font-family: 'Lato', sans-serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: 'Lato', sans-serif; }
  .caps { text-transform: uppercase; letter-spacing: 0.14em; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  [data-theme="dark"] body { background: var(--paper); }
  ::selection { background: var(--rust); color: var(--cream); }

  /* Paper grain */
  .grain::before {
    content:""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.07  0 0 0 0 0.06  0 0 0 0.14 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
    mix-blend-mode: multiply; opacity: .5;
  }
  [data-theme="dark"] .grain::before { mix-blend-mode: screen; opacity: .35; }

  /* marquee */
  @keyframes marq { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marq-track { display:flex; gap: 3rem; white-space: nowrap; animation: marq 60s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:.85;} 50%{opacity:.4;} }
  @keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes dash { to { stroke-dashoffset: -400; } }
  @keyframes fade { from {opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }
  @keyframes bellSwing { 0%,100%{ transform: rotate(-16deg); } 50%{ transform: rotate(16deg); } }
  @keyframes bellRipple { 0%{ transform: scale(0.8); opacity: 0.7; } 100%{ transform: scale(1.6); opacity: 0; } }
  @keyframes heartFloat { 0%{ transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; } 20%{ opacity: 1; transform: scale(1); } 100%{ transform: translateY(-100vh) scale(0.3) rotate(45deg); opacity: 0; } }
  @keyframes matchPop { 0%{ transform: scale(0.85); opacity: 0; } 50%{ transform: scale(1.04); } 100%{ transform: scale(1); opacity: 1; } }
  @keyframes matchBadgePulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.06); } }
  @keyframes matchGlow { 0%,100%{ box-shadow: 0 0 0 0 #6B152000; } 50%{ box-shadow: 0 0 20px 4px #6B152040; } }

  .fadein { animation: fade .6s ease both; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }

  .reveal-carousel::-webkit-scrollbar { display: none; }

  .quiz-opts { display: grid !important; grid-auto-columns: 1fr; grid-auto-flow: column; }
  .quiz-opts > button { text-align: center; }

  /* subtle link hover */
  .u { border-bottom: 1px solid currentColor; padding-bottom: 1px; transition: opacity .15s; }
  .u:hover { opacity: .6; }

  /* Password peek-then-mask */
  input.pw-peek { -webkit-text-security: disc; }
  input.pw-peek:focus { animation: none; }

  /* CTA hover effects */
  button { transition: all .2s ease; }
  button:hover { opacity: 0.85; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
</style>
